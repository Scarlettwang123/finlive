services:
  - type: web
    name: finlive-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: your-secret-key-here
      - key: DATABASE_URL
        value: sqlite:///instance/finlive.db
    plan: free